<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026年北海道之旅</title>

<style>
* { box-sizing:border-box; margin:0; padding:0; font-family:'Segoe UI', Microsoft JhengHei, sans-serif; }

body { background:#f4f7f6; color:#333; padding:20px; }

header {
    text-align:center;
    padding:40px 0;
    background:linear-gradient(135deg,#4ca1af,#2c3e50);
    color:white;
    border-radius:8px;
    margin-bottom:15px;
}

header h1 { font-size:2.2rem; }

/* tabs */
.tabs{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
    margin:20px 0 30px;
}

.tab-btn{
    border:none;
    padding:8px 14px;
    border-radius:20px;
    background:#dfe6e9;
    cursor:pointer;
    font-weight:bold;
}

.tab-btn.active{
    background:#2c3e50;
    color:white;
}

/* page */
.day-content{ display:none; }
.day-content.active{ display:block; }

/* timeline */
.container{ max-width:800px; margin:auto; }

.day-title{
    background:#2c3e50;
    color:white;
    padding:10px 20px;
    border-radius:20px;
    display:inline-block;
    margin:20px 0;
}

.timeline{
    position:relative;
    padding-left:30px;
    margin-bottom:40px;
}

.timeline::before{
    content:'';
    position:absolute;
    left:5px;
    top:0;
    width:4px;
    height:100%;
    background:#4ca1af;
}

.timeline-item{
    background:white;
    padding:20px;
    margin-bottom:20px;
    border-radius:8px;
    box-shadow:0 3px 10px rgba(0,0,0,0.05);
}

.time{ color:#4ca1af; font-weight:bold; display:block; margin-bottom:5px; }

.title{ font-size:1.2rem; margin-bottom:8px; }

.description{ font-size:0.95rem; color:#666; line-height:1.6; }

.tag{ display:inline-block; padding:3px 10px; border-radius:12px; font-size:12px; margin-top:5px; }
.tag-food{ background:#ffeaa7; }
.tag-scenery{ background:#dff9fb; }
.tag-transport{ background:#dfe6e9; }

.btn{
    display:inline-block;
    margin-top:8px;
    padding:6px 12px;
    background:#4ca1af;
    color:white;
    text-decoration:none;
    border-radius:6px;
}

</style>
</head>

<body>

<header>
<h1>2026年北海道之旅</h1>
<p>06/26 ~ 07/01</p>
</header>

<!-- tabs -->
<div class="tabs">
<button class="tab-btn active" onclick="showPage('home',this)">🏠 首頁</button>
<button class="tab-btn" onclick="showPage('day1',this)">06/26</button>
<button class="tab-btn" onclick="showPage('day2',this)">06/27</button>
<button class="tab-btn" onclick="showPage('day3',this)">06/28</button>
<button class="tab-btn" onclick="showPage('day4',this)">06/29</button>
<button class="tab-btn" onclick="showPage('day5',this)">06/30</button>
<button class="tab-btn" onclick="showPage('day6',this)">07/01</button>
</div>

<div class="container">

<!-- HOME -->
<div id="home" class="day-content active">

    <!-- 👉 你原本 intro-section 放這裡（完全不動） -->
    <!-- 我這裡先保留位置 -->
    <p style="text-align:center;">👇 旅遊前言請保留你原本內容貼回來</p>

</div>

<!-- DAY1（你原 DAY1） -->
<div id="day1" class="day-content">
<div class="day-title">DAY 1 06/26 富良野</div>
<div class="timeline">
<!-- 你 DAY1 原內容貼這裡 -->
</div>
</div>

<!-- DAY2 -->
<div id="day2" class="day-content">
<div class="day-title">DAY 2 06/27 美瑛</div>
<div class="timeline">
<!-- DAY2 原內容 -->
</div>
</div>

<!-- DAY3 -->
<div id="day3" class="day-content">
<div class="day-title">DAY 3 06/28 富良野</div>
<div class="timeline">
<!-- DAY3 原內容 -->
</div>
</div>

<!-- DAY4 -->
<div id="day4" class="day-content">
<div class="day-title">DAY 4 06/29 小樽</div>
<div class="timeline">
<!-- DAY4 原內容 -->
</div>
</div>

<!-- DAY5 -->
<div id="day5" class="day-content">
<div class="day-title">DAY 5 06/30 札幌</div>
<div class="timeline">
<!-- DAY5 原內容 -->
</div>
</div>

<!-- DAY6 -->
<div id="day6" class="day-content">
<div class="day-title">DAY 6 07/01 札幌</div>
<div class="timeline">
<!-- DAY6 原內容 -->
</div>
</div>

</div>

<script>
function showPage(id,btn){

    document.querySelectorAll('.day-content')
        .forEach(e=>e.classList.remove('active'));

    document.querySelectorAll('.tab-btn')
        .forEach(e=>e.classList.remove('active'));

    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
}
</script>

</body>
</html>
