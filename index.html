<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026北海道旅遊APP</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft JhengHei;}

body{
    background:#f5f7fa;
}

/* header */
header{
    position:sticky;
    top:0;
    z-index:10;
    background:linear-gradient(135deg,#4ca1af,#2c3e50);
    color:white;
    text-align:center;
    padding:20px 10px;
}

/* tabs */
.tabs{
    display:flex;
    overflow-x:auto;
    gap:8px;
    padding:10px;
    background:white;
    position:sticky;
    top:80px;
    z-index:9;
}

.tab-btn{
    flex:0 0 auto;
    padding:8px 14px;
    border:none;
    border-radius:20px;
    background:#e0e0e0;
    cursor:pointer;
    white-space:nowrap;
}

.tab-btn.active{
    background:#2c3e50;
    color:white;
}

/* pages */
.page{
    display:none;
    padding:15px;
    max-width:800px;
    margin:auto;
}

.page.active{
    display:block;
}

/* card */
.card{
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

/* timeline */
.timeline{
    border-left:3px solid #4ca1af;
    margin-left:10px;
    padding-left:15px;
}

.item{
    margin-bottom:15px;
}

/* buttons */
.nav-btns{
    display:flex;
    justify-content:space-between;
    margin:15px 0;
}

.nav-btns button{
    padding:8px 14px;
    border:none;
    border-radius:8px;
    background:#4ca1af;
    color:white;
}

</style>
</head>

<body>

<header>
<h2>2026 北海道旅遊 APP</h2>
</header>

<!-- tabs -->
<div class="tabs">
<button class="tab-btn active" onclick="go('home',this)">🏠</button>
<button class="tab-btn" onclick="go('d1',this)">06/26</button>
<button class="tab-btn" onclick="go('d2',this)">06/27</button>
<button class="tab-btn" onclick="go('d3',this)">06/28</button>
<button class="tab-btn" onclick="go('d4',this)">06/29</button>
<button class="tab-btn" onclick="go('d5',this)">06/30</button>
<button class="tab-btn" onclick="go('d6',this)">07/01</button>
</div>

<!-- HOME -->
<div id="home" class="page active">

<div class="card">
<h3>🌤 天氣</h3>
<p>北海道 10°C ~ 26°C</p>
</div>

<div class="card">
<h3>🧳 行李清單</h3>
<p>護照 / 充電器 / 外套 / 現金 / 行動電源</p>
</div>

<div class="card">
<h3>📌 旅遊宣言</h3>
<p>開心最重要，不趕行程，不生氣，只享受</p>
</div>

</div>

<!-- DAY 1 -->
<div id="d1" class="page">
<h3>DAY 1 06/26</h3>
<div class="timeline">
<div class="item">✈️ 機場 → 北海道</div>
</div>
</div>

<!-- DAY 2 -->
<div id="d2" class="page">
<h3>DAY 2 06/27</h3>
<div class="timeline">
<div class="item">🌊 青池 / 白鬚瀑布</div>
</div>
</div>

<!-- DAY 3 -->
<div id="d3" class="page">
<h3>DAY 3 06/28</h3>
<div class="timeline"></div>
</div>

<!-- DAY 4 -->
<div id="d4" class="page"></div>

<!-- DAY 5 -->
<div id="d5" class="page"></div>

<!-- DAY 6 -->
<div id="d6" class="page"></div>

<script>

let current = "home";

function go(id,btn){

    document.querySelectorAll('.page')
        .forEach(p=>p.classList.remove('active'));

    document.querySelectorAll('.tab-btn')
        .forEach(b=>b.classList.remove('active'));

    document.getElementById(id).classList.add('active');
    btn.classList.add('active');

    current = id;
    localStorage.setItem("trip_page",id);
}

/* 記住頁面 */
window.onload = function(){
    const saved = localStorage.getItem("trip_page");
    if(saved){
        document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));

        document.getElementById(saved).classList.add('active');

        let btn = [...document.querySelectorAll('.tab-btn')]
            .find(b=>b.textContent.includes(saved.replace('d','')));

        if(btn) btn.classList.add('active');
    }
}

</script>

</body>
</html>
